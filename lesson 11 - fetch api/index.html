<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <div id="cartsDiv"></div>




    <div class="target"></div>







    <script>
        // - взяти https://dummyjson.com/docs/carts та вивести інформацію про всі корзини. Відобразити всі поля кожної корзини.
       
        const cartsDiv = document.getElementById('cartsDiv')

        fetch('https://dummyjson.com/carts')
        .then(value => value.json())
        .then(cartsObject => {
            const {carts} = cartsObject;

            for (const cart of carts) {
                const div = document.createElement('div');
                div.classList.add('content-container');
                const divWithInfo = document.createElement('div')
                divWithInfo.innerText = `
                    "total": ${cart.total},
                    "userId": ${cart.userId},
                    "totalProducts": ${cart.totalProducts},
                    "totalQuantity": ${cart.totalQuantity}
                `;
                const ol = document.createElement('ol');
                for (const product of cart.products) {
                    const li = document.createElement('li');
                    const info = document.createElement('p');
                    info.innerText = `
                        "id": ${product.id},
                        "title": ${product.title},
                        "price": ${product.price},
                        "quantity": ${product.quantity}
                    `;
                    ol.append(li, info);
                }
                div.append(divWithInfo, ol)
                cartsDiv.appendChild(div)
            }
        })

        // - взяти https://dummyjson.com/recipes та вивести інформацію про всі рецепти. Інгредієнти повинні бути список під час відображення.
        
        const target = document.getElementsByClassName('target')[0];

        fetch('https://dummyjson.com/recipes?limit=50')
        .then(value => value.json())
        .then(recipesObject => {
            const {recipes} = recipesObject;
            
            for (const recipe of recipes) {

                const recipeDiv = document.createElement('div');

                for (const recipeKey in recipe) {
                    if (Array.isArray(recipe[recipeKey])){
                        const recipeOl = document.createElement('ol');
                        const array = recipe[recipeKey];
                        for (const item of array) {
                            const recipeLi = document.createElement('li');
                            recipeLi.innerText = item;
                            recipeOl.appendChild(recipeLi);
                        }
                        recipeDiv.appendChild(recipeOl)
                    }else{
                        if (recipeKey !== 'image'){
                            const keyDiv = document.createElement('div');
                            keyDiv.innerText = `${recipeKey}: ${recipe[recipeKey]}`
                            recipeDiv.appendChild(keyDiv);
                        }
                    }
                }
                const recipeImg = document.createElement('img');
                recipeImg.src = recipe.image;
                recipeDiv.appendChild(recipeImg)
                
                target.appendChild(recipeDiv);

            }
        })
    </script>
</body>
</html>
