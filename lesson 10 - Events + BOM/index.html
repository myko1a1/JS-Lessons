<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="" href="indexClaude.jsx">
</head>
<body>
    <div id="text">Lorem ipsum dolor sit.</div>

    <button id="btn">Hide</button>

    <form name="FirstForm">
        <input type="text" name="name">
        <input type="text" name="surname">
        <input type="number" name="age">
        <button>Send</button>
    </form>
    <p id="target"></p>

    <div id="locStorage"></div>

    <input id="xxx" type="number">
    <div id="resultDiv"></div>

    <!-- SCRIPT -->


    <script>
        // - Створити довільний елемент з id = text та створити кнопку.Використовуючи JavaScript, зробіть так, щоб при натисканні на кнопку зникав елемент з id="text".

        const button = document.getElementById('btn');
        
        button.onclick = function() {
            document.getElementById('text').style.display = 'none';
        };

        // Створити форму з трьома полями для name,sruname,age та кнопкою. При натисканні на кнопку зчитати данні з полів, та вивести об'єкт в документ. Іншими словами : заповниои форму, натиснули кнопку, під формою з'явився блок з вашим об'єктом

        const FirstForm = document.forms.FirstForm;
        const target = document.getElementById('target')

        FirstForm.addEventListener('submit', (e) => {
            e.preventDefault(); //  - убирает перезапуск
            const nameValue = FirstForm.name.value;
            const surnameValue = FirstForm.surname.value;
            const ageValue = FirstForm.age.value;
            let obj = {nameValue, surnameValue, ageValue}
            target.innerText = obj.nameValue + ' ' + obj.surnameValue + ' ' + obj.ageValue;
        })
        
        // є сторінка, на якій є блок, я кому знаходиьтся цифра. написати код, який при кожному перезавантажені сторінки буде додавати до неї +1

        let currentNumber = +(localStorage.getItem('number') || 0);
        currentNumber += 1;
        localStorage.setItem('number', currentNumber);

        document.getElementById('locStorage').innerText = currentNumber;

        // Є сторінка index.html (назва довільна), при відвідуванні якої в локальне сховще, в масив sessionsList зберігається інформація про дату та час відвідування сторінки. Є  сторінка sessionsListPage.html (назва довільна), при відвідуванні якої потрібно відмалювати всю інформацію про відвідування сторінки index.html. Інфу НЕ виводити в консоль, а малювати в DOM

        let sessionsList = JSON.parse(localStorage.getItem('sessionsList') || '[]');
        sessionsList.push(new Date());
        localStorage.setItem('sessionsList', JSON.stringify(sessionsList));

        // створити конвертор ваги з кг в фунти. данні заповнюються через інпут. При введенні даних обрахунок стається миттєво, без натискань додаткових кнопок

        const input = document.getElementById('xxx');
        const resultDiv = document.getElementById('resultDiv')
        input.oninput = function () {
            const kg = +this.value;
            resultDiv.innerText = kg * 2.2;
        };

        // В localStorage зберігаються масиви. Вам потрібно зробити функцію, які дістає потрібний вам масив з localStorage та додає в нього об'єкт
        // сигнатура функції -
        // addToLocalStorage(arrayName:string,objToAdd:any{}):void

        function addToLocalStorage(arrayName, objToAdd){
            const LsItem = localStorage.getItem(arrayName);
            if (!LsItem){
                throw new Error ('there is no such array!')
            }

            const LsArray = JSON.parse(LsItem);
            if (typeof objToAdd === 'object'){
                LsArray.push(objToAdd);
            }
            localStorage.setItem(arrayName, JSON.stringify(LsArray))
        };
    </script>
</body>
</html>
