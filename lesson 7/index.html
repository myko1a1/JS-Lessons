    function Car(mode, producer, year, maxSpeed, enginePower){
        this.mode = mode;
        this.producer = producer;
        this.year = year;

        this.changeYear = function(newYear) {

        };
        this.addDriver = function (driverObject){
            this.driver = driverObject;
        };
    };
