        // - Напишіть функцію stringToarray(str), яка перетворює рядок на масив слів.
        // let str = 'Ревуть воли як ясла повні';
        // let arr = stringToarray(str); ['Ревуть', 'воли', 'як', 'ясла', 'повні']
        function stringToarray(str){
            if (str){
                const split = str.split(' ');

            }
            return [' '];
        }
        console.log(stringToarray('Ревуть воли як ясла повні'))

        // - є масив чисел [10,8,-7,55,987,-1011,0,1050,0] . за допомоги map  перетворити всі об'єкти в масиві на стрінгові.

        // - створити функцію sortNums(array,direction), яка прймає масив чисел, та сортує його від більшого до меньшого, або навпаки в залежності від значення аргументу direction.
        // let nums = [11,21,3];
        // sortNums(nums,'ascending') // [3,11,21]
        // sortNums(nums,'descending') // [21,11,3]
        function sortNums(nums, direction){
            if (direction === 'ascending') return nums.sort((a, b) => a - b);
            if (direction === 'descending') return nums.sort((a, b) => b - a);
        }
        console.log(sortNums([11, 21, 3], 'descending'))

        // let coursesAndDurationArray = [
        //     {title: 'JavaScript Complex', monthDuration: 5},
        //     {title: 'Java Complex', monthDuration: 6},

        // -- відсортувати його за спаданням за monthDuration
        // -- відфільтрувати , залишивши тільки курси з тривалістю більше 5 місяців
        // -- за допомоги map перетворити кожен елемент на наступний тип {id,title,monthDuration}
        let coursesAndDurationArray = [
            {title: 'JavaScript Complex', monthDuration: 5},

        });
        console.log(map)

        // описати колоду карт (від 6 до туза без джокерів)
        // - знайти піковий туз
        // - всі шістки
        // - всі червоні карти
        // - всі буби
        // - всі трефи від 9 та більше

        // {
        //     cardSuit: '', // 'spade', 'diamond','heart', 'clubs'
        //     value: '', // '6'-'10', 'ace','jack','queen','king'
        //     color:'', // 'red','black'
        // }
        const suits = ['spade', 'diamond', 'heart', 'club'];
        const values = [6, 7, 8, 9, 10, 'jack', 'queen', 'king', 'ace'];
        const cards = [];

        for (const suit of suits){
            for (const value of values){
                const card = {cardSuit: suit, value: value};
                if (suit === 'heart' || suit === 'diamond'){
                    card.color = 'red';
                }else{
                    card.color = 'black';
                }
                cards.push(card);
            }
        }
        // - знайти піковий туз
        console.log(cards.find(card => card.value === 'ace' && card.cardSuit === 'spade'));
        // - всі шістки
        console.log(cards.filter(card => card.value === 6));
        // - всі червоні карти
        console.log(cards.filter(card => card.color === 'red'));
        // - всі буби
        console.log(cards.filter(card => card.cardSuit === 'club'));
        // - всі трефи від 9 та більше
        console.log(cards.filter(card => card.cardSuit === 'diamond' && card.value > 9 || card.cardSuit === 'diamond' && card.value === 'queen' || card.cardSuit === 'diamond' && card.value === 'jack' || card.cardSuit === 'diamond' && card.value === 'king' || card.cardSuit === 'diamond' && card.value === 'ace'));

        // Взяти описану колоду карт, та за допомоги reduce упакувати всі карти по "мастях" в об'єкт
        const reduce = cards.reduce((accum, card) => {
            switch (card.cardSuit){
                case 'spade':
                    accum.spades.push(card);
                    break;
                case 'diamond':
                    accum.diamonds.push(card);
                    break;
                case 'heart':
                    accum.hearts.push(card);
                    break;
                case 'club':
                    accum.clubs.push(card);
                    break;
            }
            return accum;

        }, {
            spades: [],
            diamonds: [],
            hearts: [],
            clubs: []
        });
        console.log(reduce)
