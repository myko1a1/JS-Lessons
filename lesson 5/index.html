            // - створити функцію яка повертає найменьше число з масиву ARROW FUNCTION

            const arrayMinValue = (numbers) => {

            // - створити функцію sum(arr) яка приймає масив чисел, сумує значення елементів масиву та повертає його. Приклад sum([1,2,10]) //->13 ARROW FUNCTION

            // - створити функцію swap(arr,index1,index2). Функція міняє місцями заняення у відповідних індексах Приклад  swap([11,22,33,44],0,1) //=> [22,11,33,44] ARROW FUNCTION
        
            const swap = (arr, index1, index2) => {
                let temp = arr[index1];
                arr[index1] = arr[index2];
                arr[index2] = temp;

                return arr
            }
            console.log(swap([11, 22, 33, 44], 0, 1));

            // - Написати функцію обміну валюти exchange(sumUAH,currencyValues,exchangeCurrency) Приклад exchange(10000,[{currency:'USD',value:25},{currency:'EUR',value:42}],'USD') // => 400 ARROW FUNCTION
            
            const exchange = (sumUAH, currencyValues, exchangeCurrency) => {
                let chosenCurrency;
                for (const item of currencyValues){
                    if (item.currency === exchangeCurrency){
                        chosenCurrency = item;
                    }
                }
                let result = sumUAH/chosenCurrency.value;
                return result;
            }
