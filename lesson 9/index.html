<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .wrap{
            background-color: red;
            width: 200px;
            height: 200px;
        }
        .collapse{
            background-color: orange;
            width: 200px;
            height: 200px;
        }
        .alpha{
            background-color: yellow;
            width: 200px;
            height: 200px;
        }
        .beta{
            background-color: greenyellow;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    
    <script>
        // - створити блок,
        // - додати йому класи wrap, collapse, alpha, beta
        // - додати стилі(довільні значення) : колір фону, колір тексту, розмір тексту
        // - додати цей блок в body.
        // - клонувати його повністю, та додати клон в body.

        const div = document.createElement('div');

        div.classList.add('wrap')
        div.classList.add('collapse')
        div.classList.add('alpha')
        div.classList.add('beta')

        document.body.appendChild(div);

        const clone = div.cloneNode(true);

        document.body.appendChild(clone);


        // - Є масив:
        // ['Main','Products','About us','Contacts']
        // Зробити ul в середині якої будуть лежати елементи масиву (кожен в своєму li)

        let arr = ['Main','Products','About us','Contacts'];

        const menu = document.createElement('ul')
        menu.classList.add('menu')

        for (const item of arr){
            const liItem = document.createElement('li');
            liItem.innerText = item;
            menu.appendChild(liItem); 
        }

        document.body.appendChild(menu);



        // - Є масив
        // Для кожного елементу масиву зробити блок в якому вивести інформацію про title та monthDuration
        // Завдання робити через цикли.

        let coursesAndDurationArray = [
            {title: 'JavaScript Complex', monthDuration: 5},
            {title: 'Java Complex', monthDuration: 6},
            {title: 'Python Complex', monthDuration: 6},
            {title: 'QA Complex', monthDuration: 4},
            {title: 'FullStack', monthDuration: 7},
            {title: 'Frontend', monthDuration: 4}
        ];

        for (const course of coursesAndDurationArray){
            const courseDiv = document.createElement('div');
            courseDiv.innerText = `${course.title} ${course.monthDuration}`;
            document.body.appendChild(courseDiv);
        };




        // - Є масив coursesAndDurationArray 
        // За допомоги скріпта для кожного елементу масиву зробити <div class='item'> ,  в якому буде <h1 class='heading'>  з title  елементу, та <p class='description'> з monthDuration елементу.
        // Завдання робити через цикли.

        for (const courseinfo of coursesAndDurationArray){

            const CourseInfoDiv = document.createElement('div');
            CourseInfoDiv.classList.add('item');

            const CourseInfoH2 = document.createElement('h2');
            CourseInfoH2.innerText = courseinfo.title;
            CourseInfoH2.classList.add('heading');

            const CourseInfoP = document.createElement('p');
            CourseInfoP.innerText = courseinfo.monthDuration;
            CourseInfoP.classList.add('description');

            CourseInfoDiv.append(CourseInfoH2, CourseInfoP)

            document.body.appendChild(CourseInfoDiv);
        };
    </script>

</body>
</html>
